<!DOCTYPE html>
<html>
<head>
    <title>Book Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow-sm">

        <h2 class="text-center mb-4">🎟️ Book Ticket</h2>

        <p><strong>Train:</strong> {{ train.name }}</p>
        <p><strong>Available Seats:</strong> {{ train.seats_available }}</p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="name" class="form-control" placeholder="Passenger Name" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Confirm Booking
            </button>
        </form>

        {% if error %}
            <p class="text-danger mt-3">{{ error }}</p>
        {% endif %}

    </div>
</div>

</body>
</html>
