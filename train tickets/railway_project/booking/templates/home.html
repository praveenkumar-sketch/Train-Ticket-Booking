<!DOCTYPE html>
<html>
<head>
    <title>Train Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h2 class="text-center mb-4">🚆 Train Search</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="source" class="form-control" placeholder="From" required>
            </div>

            <div class="mb-3">
                <input type="text" name="destination" class="form-control" placeholder="To" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Search</button>
        </form>
    </div>

    {% if trains %}
    <div class="card mt-4 p-4 shadow-sm">
        <h3>Available Trains:</h3>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Train Name</th>
                    <th>Seats Available</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for train in trains %}
                <tr>
                    <td>{{ train.name }}</td>
                    <td>{{ train.seats_available }}</td>
                    <td>
                        <a href="/book/{{ train.id }}/" class="btn btn-success btn-sm">
                            Book
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endif %}
</div>

</body>
</html>
